<button id="theme-toggle" class="btn-reset theme-toggle-btn" type="button" aria-label="Toggle dark mode" aria-pressed="false" title="Toggle dark/light mode">
  <svg viewBox="0 0 24 24" class="icon theme-icon-light" aria-hidden="true"><use xlink:href="#svg-sun"></use></svg>
  <svg viewBox="0 0 24 24" class="icon theme-icon-dark" aria-hidden="true"><use xlink:href="#svg-moon"></use></svg>
</button>
